name: Deploy Frontend

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.ACTIONS_SSH_KEY }}
          script: |
            if [ "${{ github.ref_name }}" = "develop" ]; then
              cd /home/shmodares/apps/asama-dev/frontend
              git pull origin develop
              npm install
              npm run build
              pm2 restart asama-dev-frontend
            else
              cd /home/shmodares/apps/asama-prod/frontend
              git pull origin main
              npm install
              npm run build
              pm2 restart asama-prod-frontend
            fi
